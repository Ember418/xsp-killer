name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Validate YAML configs
        run: |
          python3 -c "
          import yaml
          from pathlib import Path
          for path in sorted(Path('config').glob('*.yaml')):
              data = yaml.safe_load(path.read_text(encoding='utf-8'))
              assert data, f'{path} empty'
              print(f'ok {path}')
          "

      - name: Ruff
        run: |
          ruff check \
            xsp_killer/data_hazards.py \
            xsp_killer/health_soak.py \
            xsp_killer/risk_gates.py \
            xsp_killer/rh_broker.py \
            xsp_killer/robinhood_mcp.py \
            xsp_killer/vol_monitor.py \
            tests/test_health_soak.py \
            tests/test_rh_mcp_confidence.py \
            tests/test_risk_and_conductor.py \
            tests/test_robinhood_mcp.py \
            tests/test_vol_monitor.py
          ruff format --check \
            xsp_killer/data_hazards.py \
            xsp_killer/health_soak.py \
            xsp_killer/risk_gates.py \
            xsp_killer/rh_broker.py \
            xsp_killer/robinhood_mcp.py \
            xsp_killer/vol_monitor.py \
            tests/test_health_soak.py \
            tests/test_rh_mcp_confidence.py \
            tests/test_risk_and_conductor.py \
            tests/test_robinhood_mcp.py \
            tests/test_vol_monitor.py

      - name: Bandit (deterministic SAST)
        run: |
          pip install bandit
          bandit -r xsp_killer -ll -q

      - name: Substrate invariant check (K138)
        run: |
          python3 scripts/xsp_docs.py check-invariants \
            xsp_killer.risk_gates \
            xsp_killer.vol_monitor \
            xsp_killer.robinhood_mcp \
            xsp_killer.health_soak \
            xsp_killer.lane_a_entry

      - name: Run tests
        run: python3 -m pytest tests/ -q
        env:
          XSP_KILLER_TEST_ISOLATION: "1"
