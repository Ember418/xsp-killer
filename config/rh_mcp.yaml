# Robinhood Agentic Trading MCP — headless adapter config (Phase 0+).
# OAuth token: .local/robinhood_mcp_token.json (never commit).
# See docs/rh_mcp_runbook.md and briefs/2026-06-29_xsp-robinhood-agentic-mcp-connection-cemini-prod.md

agentic_account_id: ""  # REQUIRED for writes — from get_accounts (Agentic account)
mcp_url: "https://agent.robinhood.com/mcp/trading"
token_path: ".local/robinhood_mcp_token.json"

allowed_chain_symbols:
  - XSP
  - SPX

live_exits: false  # master kill switch; env XSP_LANE_A_LIVE_EXITS overrides
max_contracts_per_order: 2
require_review_before_place: true

audit_log: "logs/rh_mcp_audit.jsonl"
