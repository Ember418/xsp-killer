# XSP Lane A — mentor playbook v2 (buy at close, sell by 10am)
# Entry: close window, ≥2wk DTE, cheapest near-ATM strike
# Exit: 20% stop / 20% take-profit (patient until upper BB touched)

lane: A
instrument: XSP
asset_class: option
option_type: call

entry:
  manual_or_confirm: false
  window_start_et: "15:45"
  window_end_et: "16:00"
  prior_day_spy_positive: false
  regime_gate: GREEN
  dte_min: 14
  dte_max: 60
  exclude_expiry_month: ["01"]
  chain_symbols: ["SPX", "XSP"]
  strike_max_steps_from_atm: 1
  dte_pick: min
  strike_pick: cheapest_near_atm

exit:
  stop_loss_pct: 0.20
  take_profit_pct: 0.20
  sell_eval_start_et: "09:30"
  sell_deadline_et: "10:00"
  no_sell_start_et: "08:30"
  no_sell_end_et: "09:30"
  require_upper_bb_for_take_profit: true

paper_economics:
  commission_usd_per_contract: 0.65
  slippage_usd_per_share: 0.12
  slippage_pct_of_premium: 0.005
  slippage_max_pct_of_premium: 0.015
  # NOTE: XSP index ≈ SPY level, so a real XSP contract premium ≈ the SPY
  # contract premium (~1×). 10× overstates paper $ ~10× vs a live $1k account;
  # % TP/SL are scale-invariant, and the scoreboard dual-logs a 1× real-dollar
  # approximation. The live path prices off real RH quotes (true 1×).
  premium_scale: 10.0

ta:
  symbol: SPY
  primary_timeframe: 1h
  confirm_timeframe: 15m
  bb_period: 20
  bb_std: 2.0
  confirm_optional: true
  entry:
    mode: close_window_only
    intraday_enabled: false
    require_vwap_reclaim: false
  exit:
    upper_bb_rejection: true
    upper_bb_touch_tolerance_pct: 0.002
  hold:
    suppress_morning_cut_dte_gte: 30

logging:
  logic_version: xsp_lane_a_v2
  required_fields:
    - lane
    - entry_ts
    - dte
    - strike
    - delta_at_entry
    - exit_reason
    - pnl_usd

exit_reasons:
  - stop_loss
  - take_profit
  - upper_bb_rejection
  - time_stop
  - manual

monitor:
  et_check_minutes: [30, 35, 45, 0]
  et_check_hours: [9, 9, 10]
  intraday_minutes: [0, 15, 30, 45]
  phase: 0
  rh_poll: false

paper_pnl:
  mode: hypothetical
  log_path: logs/lane_a_paper.jsonl
  brief_path: briefs/lane-a-paper-pnl-latest.json

paper_entry:
  enabled: true
  max_open_positions: 1
  quantity: 1

live:
  # XSP_LANE_A_LIVE_VARIANT_ID selects the single promoted variant; unset fails closed.
  # Sized for 2-lot operator-profile swings (~$12 premium × 2 × 50% SL ≈ $1.2k).
  # A 2-lot operator profile needs ~$5k buying power at a 50% cost frac
  # (max_debit_usd $2.5k = 50% of $5k) so the full-debit gate and cost-frac gate
  # bind together rather than one trivially dominating the other.
  max_loss_usd: 1200.0
  max_debit_usd: 2500.0
  documented_min_buying_power_usd: 5000
  max_cost_frac: 0.5
  veto_red: true
  # Deterministic pre-trade order reviewer (fail-closed second opinion before
  # buy-to-open). Disable via XSP_LANE_A_LIVE_REVIEWER=false (not recommended).
  reviewer_max_spread_frac: 0.25   # veto if (ask-bid)/mid exceeds this
  reviewer_max_contracts: 2        # align with rh_mcp max_contracts_per_order

# Shadow-only vol gates (never block paper entry unless operator enables enforce)
vol_shadow:
  lookback_days: 21
  rv_threshold: 0.28
  vix_median_lookback_days: 20
  vix_spike_ratio_halve: 2.0
  vix_trend_confirm_days: 5
  enforce_vix_halve_on_sizing: true
  # Falling-knife overlay: hard-block new entries (incl. DIP_BOUNCE) on a
  # confirmed VIX spike (>=2x 20d median, no downtrend confirm).
  veto_entry_on_vix_spike: true
